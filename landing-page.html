<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="flanner — plan your finances, track your budget, and grow your savings.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph -->
  <meta property="og:site_name" content="flanner">
  <meta property="og:type" content="website">
  <meta property="og:image" content="social-banner.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="social-banner.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta property="og:title" content="flanner">
  <meta name="twitter:title" content="flanner">
  <title>flanner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-landing">

  <div class="landing-wrap">
    <div class="greeting">
      <h1>Hello, <span class="name-highlight" id="userName">there</span></h1>
      <p>What would you like to work on today?</p>
    </div>

    <div class="apps-row">
      <a class="app-tile" href="finance-plans.html">
        <div class="tile-icon finance"><img src="Icons/Planner.svg" class="svg-icon tile-svg-icon" alt=""></div>
        <span class="tile-label">Finance<br>Planner</span>
      </a>

      <a class="app-tile" href="budget-hub.html">
        <div class="tile-icon budget"><img src="Icons/Tracker.svg" class="svg-icon tile-svg-icon" alt=""></div>
        <span class="tile-label">Budget<br>Tracker</span>
      </a>

      <a class="app-tile" href="savings-planner.html">
        <div class="tile-icon savings"><img src="Icons/Save.svg" class="svg-icon tile-svg-icon" alt=""></div>
        <span class="tile-label">Savings<br>Planner</span>
      </a>
    </div>
    <button class="btn btn-ghost btn-sm landing-signout" onclick="State.signOut()">Sign Out</button>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    (async () => {
      const ok = await State.requireAuth();
      if (!ok) return;
      document.getElementById('userName').textContent = State.getUser();
    })();
  </script>
</body>
</html>
