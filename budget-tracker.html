<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack — Budget Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-budget">

  <nav class="top-nav">
    <button class="nav-back" onclick="State.flush().then(()=>window.location.href='budget-hub.html')">← Back</button>
    <span class="nav-title" id="navTitle">Budget Tracker</span>
    <div class="nav-actions">
      <button class="btn btn-ghost view-toggle-btn hidden" id="viewToggleBtn" onclick="toggleView()">⊞ Table View</button>
    </div>
  </nav>

  <div class="budget-wrap" id="budgetWrap"></div>

  <!-- Table view (hidden by default) -->
  <div class="table-view hidden" id="tableView">
    <div class="table-wrap">
      <table class="finance-table" id="budgetTable">
        <thead>
          <tr>
            <th class="th-category">Category</th>
            <th class="th-item">Item</th>
            <th class="th-type">Type</th>
            <th class="th-amount">Allocated</th>
            <th class="th-amount">Spent</th>
            <th class="th-amount">Remaining</th>
            <th class="th-pct">% of Income</th>
          </tr>
        </thead>
        <tbody id="budgetTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    const fmt = State.fmt;
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    let currentBudget = null;

    /* ─── Helpers ─── */
    function monthLabel(key) {
      const [y, m] = key.split('-');
      return new Date(+y, +m - 1, 1).toLocaleString('default', { month: 'long', year: 'numeric' });
    }
    function monthKeyFromUrl() {
      return new URLSearchParams(window.location.search).get('month') || '';
    }
    function itemSpent(item) {
      if (item.type === 'fixed') return item.paid ? item.allocatedAmount : 0;
      return item.transactions.reduce((s, t) => s + t.amount, 0);
    }
    function catSpent(cat) { return cat.items.reduce((s, i) => s + itemSpent(i), 0); }
    function catAllocated(cat) { return cat.items.reduce((s, i) => s + i.allocatedAmount, 0); }

    /* ─── Summary numbers ─── */
    function budgetSummary(budget) {
      let totalAllocated = 0, totalSpent = 0;
      for (const cat of budget.categories) {
        totalAllocated += catAllocated(cat);
        totalSpent     += catSpent(cat);
      }
      return { totalAllocated, totalSpent, surplus: budget.netIncome - totalSpent };
    }

    /* ─── Chart ─── */
    const COLORS = ['#7c6af5','#58a6ff','#f85149','#3fb950','#fb923c','#a78bfa','#38bdf8','#fbbf24','#4ade80','#f472b6'];
    const REMAINING_COLOR = '#3d5a80';
    let summaryChart = null;

    function renderChart(budget) {
      if (summaryChart) { summaryChart.destroy(); summaryChart = null; }

      const { totalSpent, surplus } = budgetSummary(budget);
      const remaining = Math.max(0, budget.netIncome - totalSpent);
      const over = totalSpent > budget.netIncome;

      const chartBox   = document.getElementById('btChartBox');
      const chartEmpty = document.getElementById('btChartEmpty');

      chartBox.classList.remove('hidden');
      chartEmpty.classList.add('hidden');

      const SPENT_COLOR     = '#f85149'; // red
      const REMAINING_COLOR_CHART = over ? '#f85149' : '#3fb950'; // green when within budget
      const SURPLUS_COLOR   = '#3d5a80'; // muted blue

      // Two slices: spent + remaining budget
      const spentPct     = budget.netIncome > 0 ? ((totalSpent / budget.netIncome) * 100).toFixed(1) : '0.0';
      const remainingPct = budget.netIncome > 0 ? ((remaining / budget.netIncome) * 100).toFixed(1) : '100.0';

      const chartVals  = [totalSpent, remaining];
      const chartLabels = ['Spent', 'Remaining'];
      const bgColors   = ['#f85149', over ? '#3d5a80' : '#3fb950'];

      // If nothing spent yet, show a subtle placeholder
      const displayVals = chartVals.every(v => v === 0) ? [0, 1] : chartVals;

      Chart.defaults.color = '#7d8a9e';
      summaryChart = new Chart(document.getElementById('btChart'), {
        type: 'doughnut',
        data: {
          labels: chartLabels,
          datasets: [{
            data: displayVals,
            backgroundColor: bgColors,
            borderColor: '#161b27',
            borderWidth: 2,
            hoverOffset: 18
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          cutout: '62%',
          layout: { padding: 16 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const val = ctx.label === 'Spent' ? totalSpent : remaining;
                  const pct = budget.netIncome > 0 ? ((val / budget.netIncome) * 100).toFixed(1) : 0;
                  return ` ${fmt(val)}  (${pct}% of income)`;
                }
              }
            }
          }
        }
      });

      // Legend — two simple rows
      const legend = document.getElementById('btChartLegend');
      legend.innerHTML = '';

      [
        { label: 'Spent',     val: totalSpent, color: '#f85149', pct: spentPct },
        { label: 'Remaining', val: remaining,  color: over ? '#3d5a80' : '#3fb950', pct: remainingPct }
      ].forEach(row => {
        const el = document.createElement('div');
        el.className = 'leg-item';
        el.innerHTML = `
          <div class="leg-dot" style="background:${row.color}"></div>
          <span class="leg-name">${row.label}</span>
          <span class="leg-val" style="color:var(--muted);font-size:12px;margin-left:auto;margin-right:6px">${fmt(row.val)}</span>
          <span class="leg-pct">${row.pct}%</span>
        `;
        legend.appendChild(el);
      });
    }

    /* ─── Main render ─── */
    function renderPage() {
      const wrap = document.getElementById('budgetWrap');
      wrap.innerHTML = '';

      const monthKey = monthKeyFromUrl();
      if (!monthKey) { window.location.href = 'budget-hub.html'; return; }

      currentBudget = State.getBudget(monthKey);
      document.getElementById('navTitle').textContent = monthLabel(monthKey);
      document.title = `FinTrack — ${monthLabel(monthKey)}`;

      if (!currentBudget) {
        wrap.appendChild(renderStartPrompt(monthKey));
        return;
      }

      // Auto-sync plan changes into budget on every load
      State.syncBudgetFromPlan(currentBudget);
      State.saveBudget(currentBudget);

      // Show the table-view toggle now that we have a budget
      document.getElementById('viewToggleBtn').classList.remove('hidden');

      // Three-column layout matching finance-app structure
      const board = document.createElement('div');
      board.className = 'bt-board';

      // Left: categories list (no header, just cards)
      const catsCol = document.createElement('div');
      catsCol.className = 'bt-col bt-cats-col';
      catsCol.innerHTML = `<div class="col-scroll" id="catsScroll"></div>`;

      // Middle: summary stats
      const statsCol = document.createElement('div');
      statsCol.className = 'bt-col bt-stats-col';
      const { totalAllocated, totalSpent, surplus } = budgetSummary(currentBudget);
      const unallocated = currentBudget.netIncome - totalAllocated;
      statsCol.innerHTML = `
        <div class="col-header">
          <div class="col-label">Surplus</div>
          <div class="remaining-amt${surplus < 0 ? ' neg' : ''}">${surplus < 0 ? '−' : ''}${fmt(Math.abs(surplus))}</div>
        </div>
        <div class="bt-stats-body">
          <div class="bt-stat-row">
            <span class="bt-stat-label">Net Income</span>
            <span class="bt-stat-val income">${fmt(currentBudget.netIncome)}</span>
          </div>
          <div class="bt-stat-row">
            <span class="bt-stat-label">Allocated</span>
            <span class="bt-stat-val">${fmt(totalAllocated)}</span>
          </div>
          <div class="bt-stat-row">
            <span class="bt-stat-label">Spent</span>
            <span class="bt-stat-val expense">${fmt(totalSpent)}</span>
          </div>
          ${unallocated > 0 ? `
          <div class="bt-stat-row">
            <span class="bt-stat-label">Unallocated</span>
            <span class="bt-stat-val blue">${fmt(unallocated)}</span>
          </div>` : ''}
        </div>
        ${renderDangerZone(currentBudget).outerHTML}
      `;

      // Right: pie chart
      const chartCol = document.createElement('div');
      chartCol.className = 'bt-col bt-chart-col';
      chartCol.innerHTML = `
        <div class="summary-top col-header">
          <div class="col-label">Spending</div>
          <div class="remaining-amt${budgetSummary(currentBudget).surplus < 0 ? ' neg' : ''}">${fmt(Math.abs(budgetSummary(currentBudget).surplus))} ${budgetSummary(currentBudget).surplus < 0 ? 'over' : 'left'}</div>
        </div>
        <div class="summary-bottom">
          <div id="btChartBox"><canvas id="btChart"></canvas></div>
          <div id="btChartEmpty" class="empty-chart hidden">
            <div class="empty-chart-icon">🥧</div>
            <div>Add categories to see the breakdown</div>
          </div>
          <div class="chart-legend" id="btChartLegend"></div>
        </div>
      `;

      board.append(catsCol, statsCol, chartCol);
      wrap.appendChild(board);

      // Render category cards
      renderCategoryCards(currentBudget, document.getElementById('catsScroll'));

      // Render chart
      renderChart(currentBudget);

      // Re-wire danger zone buttons (innerHTML loses event listeners)
      wrap.querySelector('.bt-delete-month-btn')?.addEventListener('click', () => {
        if (!confirm(`Delete the budget for ${monthLabel(currentBudget.month)}? This will erase all transactions and cannot be undone.`)) return;
        State.deleteBudget(currentBudget.id);
        window.location.href = 'budget-hub.html';
      });
    }

    /* ─── Category cards ─── */
    function renderCategoryCards(budget, container) {
      container.innerHTML = '';
      if (budget.categories.length === 0) {
        container.innerHTML = `<div class="empty-items" style="padding:24px"><div class="empty-items-icon">📋</div><div>No expense categories yet</div><a href="finance-plans.html" class="btn btn-ghost" style="margin-top:10px">Go to Finance Planner</a></div>`;
        return;
      }
      budget.categories.forEach((cat, i) => {
        container.appendChild(makeCategoryCard(cat, budget, i));
      });
    }

    function makeCategoryCard(cat, budget, colorIdx) {
      const spent = catSpent(cat);
      const alloc = catAllocated(cat);
      const remaining = alloc - spent;
      const over = remaining < 0;
      const pct = alloc > 0 ? Math.min((spent / alloc) * 100, 100) : 0;
      const color = COLORS[colorIdx % COLORS.length];

      const wrap = document.createElement('div');
      wrap.className = 'bt-cat-card-wrap';
      wrap.style.setProperty('--cat-color', color);
      wrap.style.cursor = 'pointer';

      const card = document.createElement('div');
      card.className = 'bt-cat-nav-card';
      card.innerHTML = `
        <span class="card-name">${esc(cat.name)}</span>
        <span class="card-amt${over ? ' over' : ''}">${over ? '−' : '+'}${fmt(Math.abs(remaining))}</span>
        <span class="bt-cat-nav-arrow">›</span>
      `;

      const barWrap = document.createElement('div');
      barWrap.className = 'bt-cat-nav-bar';
      barWrap.innerHTML = `
        <div class="bt-bar-track">
          <div class="bt-bar-fill${over ? ' over' : ''}" style="width:${pct}%; background:${over ? 'var(--expense)' : color}"></div>
        </div>
        <div class="bt-cat-nav-meta">
          <span class="${over ? 'over' : ''}" style="${over ? '' : 'color:var(--muted)'}">${fmt(spent)} spent</span>
          <span>${fmt(alloc)} budget</span>
        </div>
      `;

      wrap.append(card, barWrap);
      wrap.addEventListener('click', async () => {
        await State.flush();
        window.location.href = `budget-category.html?month=${monthKeyFromUrl()}&catId=${cat.id}`;
      });
      return wrap;
    }

    /* ─── Danger zone ─── */
    function renderDangerZone(budget) {
      const div = document.createElement('div');
      div.className = 'bt-danger-zone';

      const planNote = document.createElement('div');
      planNote.className = 'bt-active-plan-note';
      planNote.textContent = budget.planName ? `Based on: ${budget.planName}` : '';

      const delBtn = document.createElement('button');
      delBtn.className = 'btn bt-delete-month-btn';
      delBtn.textContent = 'Delete this month\'s budget';

      div.append(planNote, delBtn);
      return div;
    }

    /* ─── Start prompt ─── */
    function renderStartPrompt(monthKey) {
      const plans = State.getData().plans || [];
      const div = document.createElement('div');
      div.className = 'bt-start-wrap';

      const icon = document.createElement('div');
      icon.className = 'bt-start-icon';
      icon.textContent = '💳';

      const h2 = document.createElement('h2');
      h2.textContent = `No budget for ${monthLabel(monthKey)}`;

      const p = document.createElement('p');
      p.textContent = 'Choose a Finance Plan to base this month\'s budget on.';

      let planSelect = null;
      if (plans.length > 1) {
        const label = document.createElement('div');
        label.className = 'bt-plan-label';
        label.textContent = 'Finance Plan';
        planSelect = document.createElement('select');
        planSelect.className = 'bt-plan-select';
        plans.forEach(pl => {
          const opt = document.createElement('option');
          opt.value = pl.id;
          opt.textContent = pl.name;
          if (pl.id === State.getData().activePlanId) opt.selected = true;
          planSelect.appendChild(opt);
        });
        div.append(icon, h2, p, label, planSelect);
      } else {
        const planNote = document.createElement('div');
        planNote.className = 'bt-plan-note';
        planNote.textContent = plans.length > 0 ? `Plan: ${plans[0].name}` : 'No plan found';
        div.append(icon, h2, p, planNote);
      }

      const startBtn = document.createElement('button');
      startBtn.className = 'btn btn-primary';
      startBtn.textContent = `Start ${monthLabel(monthKey)}`;
      div.appendChild(startBtn);

      startBtn.addEventListener('click', () => {
        const planId = planSelect ? planSelect.value : (plans[0]?.id);
        const budget = State.clonePlanToBudget(monthKey, planId);
        State.saveBudget(budget);
        currentBudget = budget;
        renderPage();
      });

      return div;
    }

    /* ─── Table view ─── */
    let tableViewActive = false;

    function toggleView() {
      tableViewActive = !tableViewActive;
      const btn   = document.getElementById('viewToggleBtn');
      const board = document.getElementById('budgetWrap');
      const table = document.getElementById('tableView');
      if (tableViewActive) {
        board.classList.add('hidden');
        table.classList.remove('hidden');
        buildTableView();
        btn.textContent = '⊟ Board View';
      } else {
        board.classList.remove('hidden');
        table.classList.add('hidden');
        btn.textContent = '⊞ Table View';
      }
    }

    function buildTableView() {
      if (!currentBudget) return;
      const tbody = document.getElementById('budgetTableBody');
      tbody.innerHTML = '';
      const netIncome = currentBudget.netIncome;
      const pct = (amt) => netIncome > 0 ? ((amt / netIncome) * 100).toFixed(1) + '%' : '—';

      function addRow(cells, cls) {
        const tr = document.createElement('tr');
        if (cls) tr.className = cls;
        cells.forEach(({ text, cls: tdCls, colspan }) => {
          const td = document.createElement('td');
          td.textContent = text;
          if (tdCls) td.className = tdCls;
          if (colspan) td.colSpan = colspan;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }

      let totalAllocated = 0, totalSpent = 0;

      currentBudget.categories.forEach(cat => {
        const catAlloc = cat.items.reduce((s, i) => s + i.allocatedAmount, 0);
        const catSpentAmt = cat.items.reduce((s, i) => s + itemSpent(i), 0);
        const catRem = catAlloc - catSpentAmt;

        addRow([
          { text: cat.name, cls: 'td-category expense-cat' },
          { text: '' },
          { text: '' },
          { text: fmt(catAlloc),   cls: 'td-amount' },
          { text: fmt(catSpentAmt), cls: 'td-amount' + (catSpentAmt > catAlloc ? ' td-neg' : '') },
          { text: (catRem < 0 ? '−' : '') + fmt(Math.abs(catRem)), cls: 'td-amount' + (catRem < 0 ? ' td-neg' : '') },
          { text: pct(catAlloc), cls: 'td-pct' }
        ], 'tr-category');

        cat.items.forEach(item => {
          const spent = itemSpent(item);
          const rem   = item.allocatedAmount - spent;
          addRow([
            { text: '' },
            { text: item.name, cls: 'td-item' },
            { text: item.type === 'fixed' ? 'Fixed' : 'Variable', cls: 'td-type' },
            { text: fmt(item.allocatedAmount), cls: 'td-amount' },
            { text: fmt(spent), cls: 'td-amount' + (spent > item.allocatedAmount ? ' td-neg' : '') },
            { text: (rem < 0 ? '−' : '') + fmt(Math.abs(rem)), cls: 'td-amount' + (rem < 0 ? ' td-neg' : '') },
            { text: pct(item.allocatedAmount), cls: 'td-pct' }
          ], 'tr-item');
        });

        totalAllocated += catAlloc;
        totalSpent     += catSpentAmt;
      });

      // Totals row
      const totalRem = totalAllocated - totalSpent;
      addRow([
        { text: 'Total Expenses', cls: 'td-total td-expense-total', colspan: 3 },
        { text: fmt(totalAllocated),  cls: 'td-amount td-total td-expense-total' },
        { text: fmt(totalSpent),      cls: 'td-amount td-total td-expense-total' + (totalSpent > totalAllocated ? ' td-neg' : '') },
        { text: (totalRem < 0 ? '−' : '') + fmt(Math.abs(totalRem)), cls: 'td-amount td-total td-expense-total' + (totalRem < 0 ? ' td-neg' : '') },
        { text: pct(totalAllocated), cls: 'td-pct td-total' }
      ], 'tr-total tr-expense-total');

      // Surplus row
      const surplus = netIncome - totalSpent;
      addRow([
        { text: 'Surplus', cls: 'td-remaining', colspan: 4 },
        { text: (surplus < 0 ? '−' : '') + fmt(Math.abs(surplus)), cls: 'td-amount td-remaining' + (surplus < 0 ? ' td-neg' : '') },
        { text: '' },
        { text: pct(surplus), cls: 'td-pct td-remaining' }
      ], 'tr-remaining');
    }

    /* ─── Init ─── */
    document.addEventListener('DOMContentLoaded', async () => {
      const ok = await State.requireAuth();
      if (!ok) return;
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') State.flush();
      });
      renderPage();
    });
  </script>
</body>
</html>
