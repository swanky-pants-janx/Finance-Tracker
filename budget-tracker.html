<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack — Budget Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-budget">

  <nav class="top-nav">
    <button class="nav-back" onclick="State.flush().then(()=>window.location.href='budget-hub.html')">← Back</button>
    <span class="nav-title" id="navTitle">Budget Tracker</span>
    <div class="nav-actions">
      <button class="btn btn-ghost view-toggle-btn hidden" id="viewToggleBtn" onclick="toggleView()">Table View</button>
    </div>
  </nav>

  <div class="budget-wrap" id="budgetWrap"></div>

  <!-- Table view (hidden by default) -->
  <div class="table-view hidden" id="tableView">
    <div class="table-wrap">
      <div class="table-toolbar">
        <button class="btn btn-ghost table-dl-btn" onclick="downloadTableCSV()">↓ Download CSV</button>
      </div>
      <table class="finance-table" id="budgetTable">
        <thead>
          <tr>
            <th class="th-category">Category</th>
            <th class="th-item">Item / Date</th>
            <th class="th-type">Type</th>
            <th class="th-item">Note / Status</th>
            <th class="th-amount">Allocated</th>
            <th class="th-amount">Spent</th>
            <th class="th-amount">Remaining</th>
          </tr>
        </thead>
        <tbody id="budgetTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    const fmt = State.fmt;
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    let currentBudget = null;
    let selectedCatId = null;

    /* ─── Helpers ─── */
    function monthLabel(key) {
      const [y, m] = key.split('-');
      return new Date(+y, +m - 1, 1).toLocaleString('default', { month: 'long', year: 'numeric' });
    }
    function monthKeyFromUrl() {
      return new URLSearchParams(window.location.search).get('month') || '';
    }
    function itemSpent(item) {
      if (item.type === 'fixed') return item.paid ? item.allocatedAmount : 0;
      return item.transactions.reduce((s, t) => s + t.amount, 0);
    }
    function catSpent(cat) { return cat.items.reduce((s, i) => s + itemSpent(i), 0); }
    function catAllocated(cat) { return cat.items.reduce((s, i) => s + i.allocatedAmount, 0); }
    function formatDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    /* ─── Summary numbers ─── */
    function budgetSummary(budget) {
      let totalAllocated = 0, totalSpent = 0;
      for (const cat of budget.categories) {
        totalAllocated += catAllocated(cat);
        totalSpent     += catSpent(cat);
      }
      return { totalAllocated, totalSpent, surplus: budget.netIncome - totalSpent };
    }

    /* ─── Chart ─── */
    const COLORS = ['#7c6af5','#58a6ff','#f85149','#3fb950','#fb923c','#a78bfa','#38bdf8','#fbbf24','#4ade80','#f472b6'];
    let summaryChart = null;

    function renderChart(budget) {
      if (summaryChart) { summaryChart.destroy(); summaryChart = null; }

      const { totalSpent } = budgetSummary(budget);
      const remaining = Math.max(0, budget.netIncome - totalSpent);
      const over = totalSpent > budget.netIncome;

      const spentPct     = budget.netIncome > 0 ? ((totalSpent / budget.netIncome) * 100).toFixed(1) : '0.0';
      const remainingPct = budget.netIncome > 0 ? ((remaining / budget.netIncome) * 100).toFixed(1) : '100.0';
      const displayVals  = [totalSpent, remaining].every(v => v === 0) ? [0, 1] : [totalSpent, remaining];

      Chart.defaults.color = '#7d8a9e';
      summaryChart = new Chart(document.getElementById('btChart'), {
        type: 'doughnut',
        data: {
          labels: ['Spent', 'Remaining'],
          datasets: [{
            data: displayVals,
            backgroundColor: ['#f85149', over ? '#3d5a80' : '#3fb950'],
            borderColor: '#161b27',
            borderWidth: 2,
            hoverOffset: 18
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          cutout: '62%',
          layout: { padding: 16 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const val = ctx.label === 'Spent' ? totalSpent : remaining;
                  const pct = budget.netIncome > 0 ? ((val / budget.netIncome) * 100).toFixed(1) : 0;
                  return ` ${fmt(val)}  (${pct}% of income)`;
                }
              }
            }
          }
        }
      });

      const legend = document.getElementById('btChartLegend');
      legend.innerHTML = '';
      [
        { label: 'Spent',     val: totalSpent, color: '#f85149',                          pct: spentPct },
        { label: 'Remaining', val: remaining,  color: over ? '#3d5a80' : '#3fb950',       pct: remainingPct }
      ].forEach(row => {
        const el = document.createElement('div');
        el.className = 'leg-item';
        el.innerHTML = `
          <div class="leg-dot" style="background:${row.color}"></div>
          <span class="leg-name">${row.label}</span>
          <span class="leg-val" style="color:var(--muted);font-size:12px;margin-left:auto;margin-right:6px">${fmt(row.val)}</span>
          <span class="leg-pct">${row.pct}%</span>
        `;
        legend.appendChild(el);
      });
    }

    /* ─── Main render ─── */
    function renderPage() {
      const wrap = document.getElementById('budgetWrap');
      wrap.innerHTML = '';

      const monthKey = monthKeyFromUrl();
      if (!monthKey) { window.location.href = 'budget-hub.html'; return; }

      currentBudget = State.getBudget(monthKey);
      document.getElementById('navTitle').textContent = monthLabel(monthKey);
      document.title = `FinTrack — ${monthLabel(monthKey)}`;

      if (!currentBudget) {
        wrap.appendChild(renderStartPrompt(monthKey));
        return;
      }

      State.syncBudgetFromPlan(currentBudget);
      State.saveBudget(currentBudget);

      document.getElementById('viewToggleBtn').classList.remove('hidden');

      // Validate selectedCatId still exists
      if (selectedCatId && !currentBudget.categories.find(c => c.id === selectedCatId)) {
        selectedCatId = null;
      }
      // Auto-select first category if none selected
      if (!selectedCatId && currentBudget.categories.length > 0) {
        selectedCatId = currentBudget.categories[0].id;
      }

      const board = document.createElement('div');
      board.className = 'bt-board';

      // Left: category nav
      const catsCol = document.createElement('div');
      catsCol.className = 'bt-col bt-cats-col';
      catsCol.innerHTML = `<div class="col-scroll" id="catsScroll"></div>`;

      // Middle: category detail
      const detailCol = document.createElement('div');
      detailCol.className = 'bt-col bt-detail-col';
      detailCol.id = 'btDetailCol';

      // Right: pie chart
      const chartCol = document.createElement('div');
      chartCol.className = 'bt-col bt-chart-col';
      const { surplus } = budgetSummary(currentBudget);
      chartCol.innerHTML = `
        <div class="summary-top col-header">
          <div class="col-label">Spending</div>
          <div class="remaining-amt${surplus < 0 ? ' neg' : ''}">${fmt(Math.abs(surplus))} ${surplus < 0 ? 'over' : 'left'}</div>
        </div>
        <div class="summary-bottom">
          <div id="btChartBox"><canvas id="btChart"></canvas></div>
          <div id="btChartEmpty" class="empty-chart hidden">
            <img src="icons/Tracker.svg" class="svg-icon empty-svg-icon" alt="">
            <div>Add categories to see the breakdown</div>
          </div>
          <div class="chart-legend" id="btChartLegend"></div>
        </div>
      `;

      board.append(catsCol, detailCol, chartCol);
      wrap.appendChild(board);

      renderCategoryCards(currentBudget, document.getElementById('catsScroll'));
      renderCatDetail(currentBudget, document.getElementById('btDetailCol'));
      renderChart(currentBudget);
    }

    /* ─── Category nav cards ─── */
    function renderCategoryCards(budget, container) {
      container.innerHTML = '';
      if (budget.categories.length === 0) {
        container.innerHTML = `<div class="empty-items" style="padding:24px"><img src="icons/Planner.svg" class="svg-icon empty-svg-icon" alt=""><div>No expense categories yet</div><a href="finance-plans.html" class="btn btn-ghost" style="margin-top:10px">Go to Finance Planner</a></div>`;
        return;
      }
      budget.categories.forEach((cat, i) => {
        container.appendChild(makeCategoryCard(cat, budget, i));
      });
    }

    function makeCategoryCard(cat, budget, colorIdx) {
      const spent = catSpent(cat);
      const alloc = catAllocated(cat);
      const remaining = alloc - spent;
      const over = remaining < 0;
      const pct = alloc > 0 ? Math.min((spent / alloc) * 100, 100) : 0;
      const color = COLORS[colorIdx % COLORS.length];
      const isActive = cat.id === selectedCatId;

      const wrap = document.createElement('div');
      wrap.className = 'bt-cat-card-wrap' + (isActive ? ' active' : '');
      wrap.style.setProperty('--cat-color', color);
      wrap.style.cursor = 'pointer';

      const card = document.createElement('div');
      card.className = 'bt-cat-nav-card';
      card.innerHTML = `
        <span class="card-name">${esc(cat.name)}</span>
        <span class="card-amt${over ? ' over' : ''}">${over ? '−' : '+'}${fmt(Math.abs(remaining))}</span>
        <span class="bt-cat-nav-arrow">›</span>
      `;

      const barWrap = document.createElement('div');
      barWrap.className = 'bt-cat-nav-bar';
      barWrap.innerHTML = `
        <div class="bt-bar-track">
          <div class="bt-bar-fill${over ? ' over' : ''}" style="width:${pct}%; background:${over ? 'var(--expense)' : color}"></div>
        </div>
        <div class="bt-cat-nav-meta">
          <span class="${over ? 'over' : ''}" style="${over ? '' : 'color:var(--muted)'}">${fmt(spent)} spent</span>
          <span>${fmt(alloc)} budget</span>
        </div>
      `;

      wrap.append(card, barWrap);
      wrap.addEventListener('click', () => {
        selectedCatId = cat.id;
        // Update active state on cards without full re-render
        document.querySelectorAll('.bt-cat-card-wrap').forEach(el => el.classList.remove('active'));
        wrap.classList.add('active');
        renderCatDetail(currentBudget, document.getElementById('btDetailCol'));
      });
      return wrap;
    }

    /* ─── Category detail panel ─── */
    function renderCatDetail(budget, container) {
      container.innerHTML = '';
      const cat = budget.categories.find(c => c.id === selectedCatId);

      if (!cat) {
        container.innerHTML = `<div class="bt-detail-empty"><div class="empty-items-icon">👈</div><div>Select a category</div></div>`;
        return;
      }

      const spent = catSpent(cat);
      const alloc = catAllocated(cat);
      const over  = spent > alloc;

      // Header
      const head = document.createElement('div');
      head.className = 'items-head';
      head.innerHTML = `
        <span class="items-head-title">${esc(cat.name)}</span>
        <div class="bc-head-stats">
          <span class="bc-spent-val${over ? ' over' : ' expense'}">${fmt(spent)}</span>
          <span class="bc-head-sep"> / </span>
          <span class="bc-alloc-val">${fmt(alloc)}</span>
        </div>
      `;

      // Items scroll
      const scroll = document.createElement('div');
      scroll.className = 'items-scroll';

      if (cat.items.length === 0) {
        scroll.innerHTML = `<div class="empty-items"><img src="icons/Planner.svg" class="svg-icon empty-svg-icon" alt=""><div>No items in this category</div><div style="color:var(--muted);font-size:12px;margin-top:4px">Add items in the Finance Planner</div></div>`;
      } else {
        cat.items.forEach(item => {
          scroll.appendChild(item.type === 'fixed'
            ? makeFixedRow(item, cat, budget)
            : makeVariableSection(item, cat, budget));
        });
      }

      container.append(head, scroll);
    }

    /* ─── Fixed item ─── */
    function makeFixedRow(item, cat, budget) {
      const row = document.createElement('div');
      row.className = 'item-row bc-fixed-row';
      row.innerHTML = `
        <label class="bc-fixed-label">
          <input type="checkbox" class="bt-checkbox" ${item.paid ? 'checked' : ''}>
          <span class="item-name${item.paid ? ' paid' : ''}">${esc(item.name)}</span>
        </label>
        <span class="item-amt">${fmt(item.allocatedAmount)}</span>
        <span class="item-type-badge fixed">Fixed</span>
      `;
      const cb = row.querySelector('.bt-checkbox');
      cb.addEventListener('change', () => {
        item.paid = cb.checked;
        State.saveBudget(budget);
        renderPage();
      });
      return row;
    }

    /* ─── Variable item ─── */
    function makeVariableSection(item, cat, budget) {
      const wrap = document.createElement('div');
      wrap.className = 'bc-var-section';

      const spent     = item.transactions.reduce((s, t) => s + t.amount, 0);
      const remaining = item.allocatedAmount - spent;
      const over      = remaining < 0;
      const pct       = item.allocatedAmount > 0 ? Math.min((spent / item.allocatedAmount) * 100, 100) : 0;

      const header = document.createElement('div');
      header.className = 'item-row bc-var-header';
      header.innerHTML = `
        <span class="item-name">${esc(item.name)}</span>
        <span class="item-type-badge variable">Variable</span>
        <div class="bc-var-amounts">
          <span class="${over ? 'over' : 'expense'}">${fmt(spent)}</span>
          <span class="bc-sep"> / ${fmt(item.allocatedAmount)}</span>
        </div>
        <span class="bc-var-remaining${over ? ' over' : ''}">${over ? '−' : ''}${fmt(Math.abs(remaining))}</span>
      `;

      const bar = document.createElement('div');
      bar.className = 'bt-bar-track bc-var-bar';
      bar.innerHTML = `<div class="bt-bar-fill${over ? ' over' : ''}" style="width:${pct}%"></div>`;

      const txnSection = document.createElement('div');
      txnSection.className = 'bc-txn-section';

      const addFormEl = document.createElement('div');
      addFormEl.className = 'bc-add-form';
      renderAddForm(item, budget, addFormEl);

      const listEl = document.createElement('div');
      listEl.className = 'bc-txn-list';
      renderTxnList(item, budget, listEl);

      txnSection.append(addFormEl, listEl);
      wrap.append(header, bar, txnSection);
      return wrap;
    }

    function renderAddForm(item, budget, container) {
      container.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'bc-add-row';
      row.innerHTML = `
        <input type="number" class="bc-amt-input" placeholder="Amount" min="0" step="0.01">
        <input type="text" class="bc-note-input" placeholder="Note (optional)">
        <input type="date" class="bc-date-input">
        <button class="btn btn-primary bc-save-btn">Add</button>
      `;

      const amtInput  = row.querySelector('.bc-amt-input');
      const noteInput = row.querySelector('.bc-note-input');
      const dateInput = row.querySelector('.bc-date-input');
      dateInput.value = new Date().toISOString().split('T')[0];

      const save = () => {
        const amount = parseFloat(amtInput.value);
        if (isNaN(amount) || amount <= 0) { amtInput.focus(); return; }
        item.transactions.push({
          id: State.genId(),
          amount,
          note: noteInput.value.trim(),
          date: dateInput.value || new Date().toISOString().split('T')[0]
        });
        State.saveBudget(budget);
        amtInput.value = '';
        noteInput.value = '';
        renderPage();
      };

      row.querySelector('.bc-save-btn').addEventListener('click', save);
      amtInput.addEventListener('keydown', e => { if (e.key === 'Enter') noteInput.focus(); });
      noteInput.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
      container.appendChild(row);
    }

    function renderTxnList(item, budget, container) {
      container.innerHTML = '';
      if (item.transactions.length === 0) {
        container.innerHTML = `<div class="txn-empty">No transactions yet</div>`;
        return;
      }
      const sorted = [...item.transactions].sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach(txn => {
        const row = document.createElement('div');
        row.className = 'txn-row';
        row.innerHTML = `
          <span class="txn-date">${formatDate(txn.date)}</span>
          <span class="txn-note">${esc(txn.note || '—')}</span>
          <span class="txn-amt">${fmt(txn.amount)}</span>
          <button class="txn-del" title="Delete"><img src="icons/Delete.svg" class="svg-icon btn-svg-icon" alt=""></button>
        `;
        row.querySelector('.txn-del').addEventListener('click', () => {
          item.transactions = item.transactions.filter(t => t.id !== txn.id);
          State.saveBudget(budget);
          renderPage();
        });
        container.appendChild(row);
      });
    }

    /* ─── Start prompt ─── */
    function renderStartPrompt(monthKey) {
      const plans = State.getData().plans || [];
      const div = document.createElement('div');
      div.className = 'bt-start-wrap';

      const icon = document.createElement('div');
      icon.className = 'bt-start-icon';
      icon.innerHTML = '<img src="icons/Tracker.svg" class="svg-icon" style="width:48px;height:48px;filter:brightness(0) invert(0.3);opacity:0.5" alt="">';

      const h2 = document.createElement('h2');
      h2.textContent = `No budget for ${monthLabel(monthKey)}`;

      const p = document.createElement('p');
      p.textContent = 'Choose a Finance Plan to base this month\'s budget on.';

      let planSelect = null;
      if (plans.length > 1) {
        const label = document.createElement('div');
        label.className = 'bt-plan-label';
        label.textContent = 'Finance Plan';
        planSelect = document.createElement('select');
        planSelect.className = 'bt-plan-select';
        plans.forEach(pl => {
          const opt = document.createElement('option');
          opt.value = pl.id;
          opt.textContent = pl.name;
          if (pl.id === State.getData().activePlanId) opt.selected = true;
          planSelect.appendChild(opt);
        });
        div.append(icon, h2, p, label, planSelect);
      } else {
        const planNote = document.createElement('div');
        planNote.className = 'bt-plan-note';
        planNote.textContent = plans.length > 0 ? `Plan: ${plans[0].name}` : 'No plan found';
        div.append(icon, h2, p, planNote);
      }

      const startBtn = document.createElement('button');
      startBtn.className = 'btn btn-primary';
      startBtn.textContent = `Start ${monthLabel(monthKey)}`;
      div.appendChild(startBtn);

      startBtn.addEventListener('click', () => {
        const planId = planSelect ? planSelect.value : (plans[0]?.id);
        const budget = State.clonePlanToBudget(monthKey, planId);
        State.saveBudget(budget);
        currentBudget = budget;
        renderPage();
      });

      return div;
    }

    /* ─── Table view ─── */
    let tableViewActive = false;

    function toggleView() {
      tableViewActive = !tableViewActive;
      const btn   = document.getElementById('viewToggleBtn');
      const board = document.getElementById('budgetWrap');
      const table = document.getElementById('tableView');
      if (tableViewActive) {
        board.classList.add('hidden');
        table.classList.remove('hidden');
        buildTableView();
        btn.textContent = 'Board View';
      } else {
        board.classList.remove('hidden');
        table.classList.add('hidden');
        btn.textContent = 'Table View';
      }
    }

    function buildTableView() {
      if (!currentBudget) return;
      const tbody = document.getElementById('budgetTableBody');
      tbody.innerHTML = '';
      const netIncome = currentBudget.netIncome;

      function addRow(cells, cls) {
        const tr = document.createElement('tr');
        if (cls) tr.className = cls;
        cells.forEach(({ text, cls: tdCls, colspan, html }) => {
          const td = document.createElement('td');
          if (html) td.innerHTML = html; else td.textContent = text;
          if (tdCls) td.className = tdCls;
          if (colspan) td.colSpan = colspan;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }

      let totalAllocated = 0, totalSpent = 0;

      currentBudget.categories.forEach(cat => {
        const catAlloc    = cat.items.reduce((s, i) => s + i.allocatedAmount, 0);
        const catSpentAmt = cat.items.reduce((s, i) => s + itemSpent(i), 0);
        const catRem      = catAlloc - catSpentAmt;

        addRow([
          { text: cat.name, cls: 'td-category expense-cat' },
          { text: '', colspan: 3 },
          { text: fmt(catAlloc),    cls: 'td-amount' },
          { text: fmt(catSpentAmt), cls: 'td-amount' + (catSpentAmt > catAlloc ? ' td-neg' : '') },
          { text: (catRem < 0 ? '−' : '') + fmt(Math.abs(catRem)), cls: 'td-amount' + (catRem < 0 ? ' td-neg' : '') }
        ], 'tr-category');

        cat.items.forEach(item => {
          const spent = itemSpent(item);
          const rem   = item.allocatedAmount - spent;
          const over  = spent > item.allocatedAmount;

          if (item.type === 'fixed') {
            addRow([
              { text: '' },
              { text: item.name, cls: 'td-item' },
              { text: 'Fixed', cls: 'td-type' },
              { html: item.paid
                  ? '<span style="color:var(--income);font-weight:600">✓ Paid</span>'
                  : '<span style="color:var(--muted)">Unpaid</span>',
                cls: 'td-status' },
              { text: fmt(item.allocatedAmount), cls: 'td-amount' },
              { text: item.paid ? fmt(item.allocatedAmount) : '—', cls: 'td-amount' },
              { text: item.paid ? '—' : fmt(item.allocatedAmount), cls: 'td-amount' + (item.paid ? '' : ' td-muted') }
            ], 'tr-item');
          } else {
            addRow([
              { text: '' },
              { text: item.name, cls: 'td-item' },
              { text: 'Variable', cls: 'td-type' },
              { text: item.transactions.length + ' transaction' + (item.transactions.length !== 1 ? 's' : ''), cls: 'td-status td-muted' },
              { text: fmt(item.allocatedAmount), cls: 'td-amount' },
              { text: fmt(spent), cls: 'td-amount' + (over ? ' td-neg' : '') },
              { text: (rem < 0 ? '−' : '') + fmt(Math.abs(rem)), cls: 'td-amount' + (rem < 0 ? ' td-neg' : '') }
            ], 'tr-item');

            const sorted = [...item.transactions].sort((a, b) => a.date.localeCompare(b.date));
            sorted.forEach(txn => {
              addRow([
                { text: '' },
                { text: formatDate(txn.date), cls: 'td-txn-date' },
                { text: txn.note || '—', cls: 'td-txn-note', colspan: 2 },
                { text: '' },
                { text: fmt(txn.amount), cls: 'td-amount td-txn-amt' },
                { text: '' }
              ], 'tr-txn');
            });

            if (item.transactions.length === 0) {
              addRow([
                { text: '' },
                { text: 'No transactions yet', cls: 'td-txn-note td-muted', colspan: 5 },
                { text: '' }
              ], 'tr-txn');
            }
          }
        });

        totalAllocated += catAlloc;
        totalSpent     += catSpentAmt;
      });

      const totalRem = totalAllocated - totalSpent;
      addRow([
        { text: 'Total', cls: 'td-total td-expense-total', colspan: 4 },
        { text: fmt(totalAllocated), cls: 'td-amount td-total td-expense-total' },
        { text: fmt(totalSpent),     cls: 'td-amount td-total td-expense-total' + (totalSpent > totalAllocated ? ' td-neg' : '') },
        { text: (totalRem < 0 ? '−' : '') + fmt(Math.abs(totalRem)), cls: 'td-amount td-total td-expense-total' + (totalRem < 0 ? ' td-neg' : '') }
      ], 'tr-total tr-expense-total');

      const surplus = netIncome - totalSpent;
      addRow([
        { text: 'Net Income', cls: 'td-remaining', colspan: 4 },
        { text: fmt(netIncome), cls: 'td-amount td-remaining' },
        { text: '' }, { text: '' }
      ], 'tr-remaining');
      addRow([
        { text: 'Surplus', cls: 'td-remaining', colspan: 4 },
        { text: '' },
        { text: (surplus < 0 ? '−' : '') + fmt(Math.abs(surplus)), cls: 'td-amount td-remaining' + (surplus < 0 ? ' td-neg' : '') },
        { text: '' }
      ], 'tr-remaining');
    }

    /* ─── CSV Download ─── */
    function downloadTableCSV() {
      if (!currentBudget) return;
      const monthName = monthLabel(currentBudget.month);
      const rows = [['Category', 'Item / Date', 'Type', 'Note / Status', 'Allocated', 'Spent', 'Remaining']];

      currentBudget.categories.forEach(cat => {
        const catAlloc    = cat.items.reduce((s, i) => s + i.allocatedAmount, 0);
        const catSpentAmt = cat.items.reduce((s, i) => s + itemSpent(i), 0);
        const catRem      = catAlloc - catSpentAmt;
        rows.push([cat.name, '', '', '', fmt(catAlloc), fmt(catSpentAmt), fmt(catRem)]);

        cat.items.forEach(item => {
          const spent = itemSpent(item);
          const rem   = item.allocatedAmount - spent;
          if (item.type === 'fixed') {
            rows.push(['', item.name, 'Fixed', item.paid ? 'Paid' : 'Unpaid',
              fmt(item.allocatedAmount), item.paid ? fmt(item.allocatedAmount) : '', item.paid ? '' : fmt(item.allocatedAmount)]);
          } else {
            rows.push(['', item.name, 'Variable', item.transactions.length + ' transaction(s)',
              fmt(item.allocatedAmount), fmt(spent), fmt(rem)]);
            const sorted = [...item.transactions].sort((a, b) => a.date.localeCompare(b.date));
            sorted.forEach(txn => {
              rows.push(['', txn.date, '', txn.note || '', '', fmt(txn.amount), '']);
            });
          }
        });
      });

      const { totalAllocated, totalSpent, surplus } = budgetSummary(currentBudget);
      const totalRem = totalAllocated - totalSpent;
      rows.push(['Total', '', '', '', fmt(totalAllocated), fmt(totalSpent), fmt(totalRem)]);
      rows.push(['Net Income', '', '', '', fmt(currentBudget.netIncome), '', '']);
      rows.push(['Surplus', '', '', '', '', fmt(surplus), '']);

      const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `${monthName.replace(/\s+/g, '_')}_budget.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ─── Init ─── */
    document.addEventListener('DOMContentLoaded', async () => {
      const ok = await State.requireAuth();
      if (!ok) return;
      State.initSync(renderPage);
      renderPage();
    });
  </script>
</body>
