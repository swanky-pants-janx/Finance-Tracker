<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack — Budget Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-budget">

  <nav class="top-nav">
    <button class="nav-back" onclick="window.location.href='budget-hub.html'">← Back</button>
    <span class="nav-title" id="navTitle">Budget Tracker</span>
  </nav>

  <div class="budget-wrap" id="budgetWrap"></div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    const fmt = State.fmt;
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    let currentBudget = null;

    /* ─── Helpers ─── */
    function monthLabel(key) {
      const [y, m] = key.split('-');
      return new Date(+y, +m - 1, 1).toLocaleString('default', { month: 'long', year: 'numeric' });
    }
    function monthKeyFromUrl() {
      return new URLSearchParams(window.location.search).get('month') || '';
    }
    function itemSpent(item) {
      if (item.type === 'fixed') return item.paid ? item.allocatedAmount : 0;
      return item.transactions.reduce((s, t) => s + t.amount, 0);
    }
    function catSpent(cat) { return cat.items.reduce((s, i) => s + itemSpent(i), 0); }
    function catAllocated(cat) { return cat.items.reduce((s, i) => s + i.allocatedAmount, 0); }

    /* ─── Summary numbers ─── */
    function budgetSummary(budget) {
      let totalAllocated = 0, totalSpent = 0;
      for (const cat of budget.categories) {
        totalAllocated += catAllocated(cat);
        totalSpent     += catSpent(cat);
      }
      return { totalAllocated, totalSpent, surplus: budget.netIncome - totalSpent };
    }

    /* ─── Chart ─── */
    const COLORS = ['#7c6af5','#58a6ff','#f85149','#3fb950','#fb923c','#a78bfa','#38bdf8','#fbbf24','#4ade80','#f472b6'];
    const REMAINING_COLOR = '#3d5a80';
    let summaryChart = null;

    function renderChart(budget) {
      if (summaryChart) { summaryChart.destroy(); summaryChart = null; }

      const { totalSpent, surplus } = budgetSummary(budget);
      const cats = budget.categories.filter(c => catAllocated(c) > 0);

      const chartBox   = document.getElementById('btChartBox');
      const chartEmpty = document.getElementById('btChartEmpty');

      if (cats.length === 0) {
        chartBox.classList.add('hidden');
        chartEmpty.classList.remove('hidden');
        document.getElementById('btChartLegend').innerHTML = '';
        return;
      }
      chartBox.classList.remove('hidden');
      chartEmpty.classList.add('hidden');

      const values   = cats.map(c => catAllocated(c));
      const remVal   = Math.max(0, budget.netIncome - cats.reduce((s, c) => s + catAllocated(c), 0));
      const labels   = [...cats.map(c => c.name), 'Unallocated'];
      const allVals  = [...values, remVal];
      const bgColors = [...COLORS.slice(0, cats.length), REMAINING_COLOR];

      const chartVals = allVals.every(v => v === 0) ? allVals.map((_, i) => i === allVals.length - 1 ? 1 : 0) : allVals;

      Chart.defaults.color = '#7d8a9e';
      summaryChart = new Chart(document.getElementById('btChart'), {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: chartVals,
            backgroundColor: bgColors,
            borderColor: '#161b27',
            borderWidth: 2,
            hoverOffset: 18
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          cutout: '62%',
          layout: { padding: 16 },
          onClick: (event, elements) => {
            if (!elements.length) return;
            const idx = elements[0].index;
            if (idx < cats.length) {
              window.location.href = `budget-category.html?month=${monthKeyFromUrl()}&catId=${cats[idx].id}`;
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  if (ctx.label === 'Unallocated') {
                    const pct = budget.netIncome > 0 ? ((remVal / budget.netIncome) * 100).toFixed(1) : 0;
                    return ` ${fmt(remVal)}  (${pct}% of income)`;
                  }
                  const cat   = cats[ctx.dataIndex];
                  const spent = catSpent(cat);
                  const alloc = catAllocated(cat);
                  return ` Spent: ${fmt(spent)}  /  ${fmt(alloc)}`;
                }
              }
            }
          }
        }
      });

      // Legend
      const legend = document.getElementById('btChartLegend');
      legend.innerHTML = '';
      cats.forEach((cat, i) => {
        const alloc = catAllocated(cat);
        const pct   = budget.netIncome > 0 ? ((alloc / budget.netIncome) * 100).toFixed(1) : 0;
        const el    = document.createElement('div');
        el.className    = 'leg-item';
        el.style.cursor = 'pointer';
        el.title = 'Click to open category';
        el.innerHTML = `
          <div class="leg-dot" style="background:${COLORS[i % COLORS.length]}"></div>
          <span class="leg-name">${esc(cat.name)}</span>
          <span class="leg-pct">${pct}%</span>
        `;
        el.addEventListener('click', () => {
          window.location.href = `budget-category.html?month=${monthKeyFromUrl()}&catId=${cat.id}`;
        });
        legend.appendChild(el);
      });

      if (remVal > 0) {
        const remPct = budget.netIncome > 0 ? ((remVal / budget.netIncome) * 100).toFixed(1) : 0;
        const remEl  = document.createElement('div');
        remEl.className = 'leg-item';
        remEl.innerHTML = `
          <div class="leg-dot" style="background:${REMAINING_COLOR}"></div>
          <span class="leg-name">Unallocated</span>
          <span class="leg-pct">${remPct}%</span>
        `;
        legend.appendChild(remEl);
      }
    }

    /* ─── Main render ─── */
    function renderPage() {
      const wrap = document.getElementById('budgetWrap');
      wrap.innerHTML = '';

      const monthKey = monthKeyFromUrl();
      if (!monthKey) { window.location.href = 'budget-hub.html'; return; }

      currentBudget = State.getBudget(monthKey);
      document.getElementById('navTitle').textContent = monthLabel(monthKey);
      document.title = `FinTrack — ${monthLabel(monthKey)}`;

      if (!currentBudget) {
        wrap.appendChild(renderStartPrompt(monthKey));
        return;
      }

      // Auto-sync plan changes into budget on every load
      State.syncBudgetFromPlan(currentBudget);
      State.saveBudget(currentBudget);

      // Three-column layout matching finance-app structure
      const board = document.createElement('div');
      board.className = 'bt-board';

      // Left: categories list
      const catsCol = document.createElement('div');
      catsCol.className = 'bt-col bt-cats-col';
      catsCol.innerHTML = `
        <div class="col-header">
          <div class="col-label expense-label">Categories</div>
          <div class="col-total expense-total">${fmt(currentBudget.categories.reduce((s, c) => s + catAllocated(c), 0))}</div>
        </div>
        <div class="col-scroll" id="catsScroll"></div>
      `;

      // Middle: summary stats
      const statsCol = document.createElement('div');
      statsCol.className = 'bt-col bt-stats-col';
      const { totalAllocated, totalSpent, surplus } = budgetSummary(currentBudget);
      const unallocated = currentBudget.netIncome - totalAllocated;
      statsCol.innerHTML = `
        <div class="col-header">
          <div class="col-label">Surplus</div>
          <div class="remaining-amt${surplus < 0 ? ' neg' : ''}">${surplus < 0 ? '−' : ''}${fmt(Math.abs(surplus))}</div>
        </div>
        <div class="bt-stats-body">
          <div class="bt-stat-row">
            <span class="bt-stat-label">Net Income</span>
            <span class="bt-stat-val income">${fmt(currentBudget.netIncome)}</span>
          </div>
          <div class="bt-stat-row">
            <span class="bt-stat-label">Allocated</span>
            <span class="bt-stat-val">${fmt(totalAllocated)}</span>
          </div>
          <div class="bt-stat-row">
            <span class="bt-stat-label">Spent</span>
            <span class="bt-stat-val expense">${fmt(totalSpent)}</span>
          </div>
          ${unallocated > 0 ? `
          <div class="bt-stat-row">
            <span class="bt-stat-label">Unallocated</span>
            <span class="bt-stat-val blue">${fmt(unallocated)}</span>
          </div>` : ''}
        </div>
        ${renderDangerZone(currentBudget).outerHTML}
      `;

      // Right: pie chart
      const chartCol = document.createElement('div');
      chartCol.className = 'bt-col bt-chart-col';
      chartCol.innerHTML = `
        <div class="summary-top col-header">
          <div class="col-label">Budget split</div>
        </div>
        <div class="summary-bottom">
          <div id="btChartBox"><canvas id="btChart"></canvas></div>
          <div id="btChartEmpty" class="empty-chart hidden">
            <div class="empty-chart-icon">🥧</div>
            <div>Add categories to see the breakdown</div>
          </div>
          <div class="chart-legend" id="btChartLegend"></div>
        </div>
      `;

      board.append(catsCol, statsCol, chartCol);
      wrap.appendChild(board);

      // Render category cards
      renderCategoryCards(currentBudget, document.getElementById('catsScroll'));

      // Render chart
      renderChart(currentBudget);

      // Re-wire danger zone buttons (innerHTML loses event listeners)
      wrap.querySelector('.bt-delete-month-btn')?.addEventListener('click', () => {
        if (!confirm(`Delete the budget for ${monthLabel(currentBudget.month)}? This will erase all transactions and cannot be undone.`)) return;
        State.deleteBudget(currentBudget.id);
        window.location.href = 'budget-hub.html';
      });
    }

    /* ─── Category cards ─── */
    function renderCategoryCards(budget, container) {
      container.innerHTML = '';
      if (budget.categories.length === 0) {
        container.innerHTML = `<div class="empty-items" style="padding:24px"><div class="empty-items-icon">📋</div><div>No expense categories yet</div><a href="finance-plans.html" class="btn btn-ghost" style="margin-top:10px">Go to Finance Planner</a></div>`;
        return;
      }
      budget.categories.forEach((cat, i) => {
        container.appendChild(makeCategoryCard(cat, budget, i));
      });
    }

    function makeCategoryCard(cat, budget, colorIdx) {
      const spent = catSpent(cat);
      const alloc = catAllocated(cat);
      const remaining = alloc - spent;
      const over = remaining < 0;
      const pct = alloc > 0 ? Math.min((spent / alloc) * 100, 100) : 0;

      const card = document.createElement('div');
      card.className = 'cat-card bt-cat-nav-card';
      card.style.setProperty('--cat-color', COLORS[colorIdx % COLORS.length]);

      card.innerHTML = `
        <span class="bt-cat-color-bar"></span>
        <span class="card-name">${esc(cat.name)}</span>
        <span class="card-amt${over ? ' over' : ''}">${over ? '−' : ''}${fmt(Math.abs(remaining))}</span>
        <span class="bt-cat-nav-arrow">›</span>
      `;

      // Progress bar under the card
      const barWrap = document.createElement('div');
      barWrap.className = 'bt-cat-nav-bar';
      barWrap.innerHTML = `
        <div class="bt-bar-track">
          <div class="bt-bar-fill${over ? ' over' : ''}" style="width:${pct}%"></div>
        </div>
        <div class="bt-cat-nav-meta">
          <span class="${over ? 'over' : 'expense'}">${fmt(spent)} spent</span>
          <span style="color:var(--muted)"> / ${fmt(alloc)}</span>
        </div>
      `;

      card.addEventListener('click', () => {
        window.location.href = `budget-category.html?month=${monthKeyFromUrl()}&catId=${cat.id}`;
      });

      const wrap = document.createElement('div');
      wrap.className = 'bt-cat-card-wrap';
      wrap.append(card, barWrap);
      return wrap;
    }

    /* ─── Danger zone ─── */
    function renderDangerZone(budget) {
      const div = document.createElement('div');
      div.className = 'bt-danger-zone';

      const planNote = document.createElement('div');
      planNote.className = 'bt-active-plan-note';
      planNote.textContent = budget.planName ? `Based on: ${budget.planName}` : '';

      const delBtn = document.createElement('button');
      delBtn.className = 'btn bt-delete-month-btn';
      delBtn.textContent = 'Delete this month\'s budget';

      div.append(planNote, delBtn);
      return div;
    }

    /* ─── Start prompt ─── */
    function renderStartPrompt(monthKey) {
      const plans = State.getData().plans || [];
      const div = document.createElement('div');
      div.className = 'bt-start-wrap';

      const icon = document.createElement('div');
      icon.className = 'bt-start-icon';
      icon.textContent = '💳';

      const h2 = document.createElement('h2');
      h2.textContent = `No budget for ${monthLabel(monthKey)}`;

      const p = document.createElement('p');
      p.textContent = 'Choose a Finance Plan to base this month\'s budget on.';

      let planSelect = null;
      if (plans.length > 1) {
        const label = document.createElement('div');
        label.className = 'bt-plan-label';
        label.textContent = 'Finance Plan';
        planSelect = document.createElement('select');
        planSelect.className = 'bt-plan-select';
        plans.forEach(pl => {
          const opt = document.createElement('option');
          opt.value = pl.id;
          opt.textContent = pl.name;
          if (pl.id === State.getData().activePlanId) opt.selected = true;
          planSelect.appendChild(opt);
        });
        div.append(icon, h2, p, label, planSelect);
      } else {
        const planNote = document.createElement('div');
        planNote.className = 'bt-plan-note';
        planNote.textContent = plans.length > 0 ? `Plan: ${plans[0].name}` : 'No plan found';
        div.append(icon, h2, p, planNote);
      }

      const startBtn = document.createElement('button');
      startBtn.className = 'btn btn-primary';
      startBtn.textContent = `Start ${monthLabel(monthKey)}`;
      div.appendChild(startBtn);

      startBtn.addEventListener('click', () => {
        const planId = planSelect ? planSelect.value : (plans[0]?.id);
        const budget = State.clonePlanToBudget(monthKey, planId);
        State.saveBudget(budget);
        currentBudget = budget;
        renderPage();
      });

      return div;
    }

    /* ─── Init ─── */
    document.addEventListener('DOMContentLoaded', async () => {
      const ok = await State.requireAuth();
      if (!ok) return;
      renderPage();
    });
  </script>
</body>
</html>
