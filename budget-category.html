<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack — Budget Category</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-category">

  <nav class="top-nav">
    <button class="nav-back" id="navBack">← Back</button>
    <span class="nav-title" id="navTitle">Category</span>
    <span class="nav-tag expense" id="navTag"></span>
  </nav>

  <div class="cat-content">

    <!-- Items panel -->
    <div class="items-panel">
      <div class="items-head">
        <span class="items-head-title">Items</span>
        <div class="bc-head-stats">
          <span class="bc-spent-val expense" id="headSpent">R 0.00</span>
          <span class="bc-head-sep"> / </span>
          <span class="bc-alloc-val" id="headAlloc">R 0.00</span>
        </div>
      </div>
      <div class="items-scroll" id="itemsScroll"></div>
    </div>

    <div class="col-resizer" id="panelResizer"></div>

    <!-- Chart side -->
    <div class="chart-side" id="chartSide">

      <div class="chart-section">
        <div class="chart-title">Category breakdown</div>
        <div class="chart-box-wrap"><div id="chartBox"><canvas id="catChart"></canvas></div></div>
        <div id="chartEmpty" class="empty-chart hidden">
          <div class="empty-chart-icon">🥧</div>
          <div>No items to display</div>
        </div>
        <div class="chart-legend" id="catLegend"></div>
      </div>

      <div class="chart-divider"></div>

      <div class="chart-section">
        <div class="chart-section-header">
          <div class="col-label">Budget surplus</div>
          <div class="chart-remaining-amt" id="chartSurplus">R 0.00</div>
        </div>
        <div class="chart-box-wrap"><div id="overallChartBox"><canvas id="overallChart"></canvas></div></div>
        <div id="overallChartEmpty" class="empty-chart hidden">
          <div class="empty-chart-icon">🥧</div>
          <div>No budget data yet</div>
        </div>
      </div>

    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    const fmt = State.fmt;
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function getParams() {
      const p = new URLSearchParams(window.location.search);
      return { month: p.get('month'), catId: p.get('catId') };
    }

    function getContext() {
      const { month, catId } = getParams();
      const budget = State.getBudget(month);
      if (!budget) return { budget: null, cat: null };
      const cat = budget.categories.find(c => c.id === catId);
      return { budget, cat };
    }

    function itemSpent(item) {
      if (item.type === 'fixed') return item.paid ? item.allocatedAmount : 0;
      return item.transactions.reduce((s, t) => s + t.amount, 0);
    }
    function catSpent(cat) { return cat.items.reduce((s, i) => s + itemSpent(i), 0); }
    function catAllocated(cat) { return cat.items.reduce((s, i) => s + i.allocatedAmount, 0); }

    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    /* ════════════════════════════════════════
       CHARTS
    ════════════════════════════════════════ */
    const COLORS = ['#7c6af5','#58a6ff','#f85149','#3fb950','#fb923c','#a78bfa','#38bdf8','#fbbf24','#4ade80','#f472b6'];
    const REMAINING_COLOR = '#3d5a80';
    let catChart = null;
    let overallChart = null;

    function renderCatChart(cat) {
      if (catChart) { catChart.destroy(); catChart = null; }

      const items = cat.items;
      if (items.length === 0) {
        document.getElementById('chartBox').classList.add('hidden');
        document.getElementById('chartEmpty').classList.remove('hidden');
        document.getElementById('catLegend').innerHTML = '';
        return;
      }

      document.getElementById('chartBox').classList.remove('hidden');
      document.getElementById('chartEmpty').classList.add('hidden');

      const values = items.map(i => i.allocatedAmount || 0);
      const chartValues = values.every(v => v === 0) ? items.map(() => 1) : values;
      const chartTotal = values.reduce((s, v) => s + v, 0);

      Chart.defaults.color = '#7d8a9e';
      catChart = new Chart(document.getElementById('catChart'), {
        type: 'doughnut',
        data: {
          labels: items.map(i => i.name),
          datasets: [{
            data: chartValues,
            backgroundColor: COLORS.slice(0, items.length),
            borderColor: '#161b27',
            borderWidth: 2,
            hoverOffset: 18
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true, aspectRatio: 1,
          cutout: '60%',
          layout: { padding: 16 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const item = items[ctx.dataIndex];
                  const spent = itemSpent(item);
                  const alloc = item.allocatedAmount;
                  const pct = alloc > 0 ? ((spent / alloc) * 100).toFixed(1) : '0.0';
                  return ` Spent: ${fmt(spent)}  /  ${fmt(alloc)}  (${pct}%)`;
                }
              }
            }
          }
        }
      });

      const legend = document.getElementById('catLegend');
      legend.innerHTML = '';
      items.forEach((item, i) => {
        const spent = itemSpent(item);
        const alloc = item.allocatedAmount;
        const pct = alloc > 0 ? ((spent / alloc) * 100).toFixed(1) : '0.0';
        const over = spent > alloc;
        const el = document.createElement('div');
        el.className = 'leg-item';
        el.innerHTML = `
          <div class="leg-dot" style="background:${COLORS[i % COLORS.length]}"></div>
          <span class="leg-name">${esc(item.name)}</span>
          <span class="leg-pct${over ? ' over' : ''}">${pct}%</span>
        `;
        legend.appendChild(el);
      });
    }

    function renderOverallChart(budget, currentCatId) {
      if (overallChart) { overallChart.destroy(); overallChart = null; }

      const totalSpent = budget.categories.reduce((s, c) => s + catSpent(c), 0);
      const surplus = budget.netIncome - totalSpent;
      const surplusEl = document.getElementById('chartSurplus');
      surplusEl.textContent = fmt(Math.abs(surplus));
      surplusEl.className = 'chart-remaining-amt' + (surplus < 0 ? ' neg' : '');

      const cats = budget.categories.filter(c => catAllocated(c) > 0);
      if (cats.length === 0) {
        document.getElementById('overallChartBox').classList.add('hidden');
        document.getElementById('overallChartEmpty').classList.remove('hidden');
        return;
      }

      document.getElementById('overallChartBox').classList.remove('hidden');
      document.getElementById('overallChartEmpty').classList.add('hidden');

      const values   = cats.map(c => catAllocated(c));
      const bgColors = cats.map((_, i) => COLORS[i % COLORS.length]);
      const currentIdx = cats.findIndex(c => c.id === currentCatId);
      const offsets  = values.map((_, i) => i === currentIdx ? 8 : 0);

      Chart.defaults.color = '#7d8a9e';
      overallChart = new Chart(document.getElementById('overallChart'), {
        type: 'doughnut',
        data: {
          labels: cats.map(c => c.name),
          datasets: [{
            data: values,
            backgroundColor: bgColors,
            borderColor: '#161b27',
            borderWidth: 2,
            offset: offsets,
            hoverOffset: 18
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true, aspectRatio: 1,
          cutout: '60%',
          layout: { padding: 16 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const cat = cats[ctx.dataIndex];
                  const spent = catSpent(cat);
                  const alloc = catAllocated(cat);
                  const pct = budget.netIncome > 0 ? ((alloc / budget.netIncome) * 100).toFixed(1) : '0.0';
                  return ` ${fmt(spent)} spent  /  ${fmt(alloc)} allocated  (${pct}% of income)`;
                }
              }
            }
          }
        }
      });
    }

    /* ════════════════════════════════════════
       RENDER
    ════════════════════════════════════════ */
    function renderPage() {
      const { budget, cat } = getContext();
      const { month } = getParams();
      if (!budget || !cat) { window.location.href = `budget-tracker.html?month=${month || ''}`; return; }

      document.getElementById('navTitle').textContent = cat.name;
      document.title = `FinTrack — ${cat.name}`;

      const spent = catSpent(cat);
      const alloc = catAllocated(cat);
      const over = spent > alloc;

      const spentEl = document.getElementById('headSpent');
      spentEl.textContent = fmt(spent);
      spentEl.className = 'bc-spent-val' + (over ? ' over' : ' expense');
      document.getElementById('headAlloc').textContent = fmt(alloc);

      renderItems(cat, budget);
      renderCatChart(cat);
      renderOverallChart(budget, cat.id);
    }

    function renderItems(cat, budget) {
      const scroll = document.getElementById('itemsScroll');
      scroll.innerHTML = '';

      if (cat.items.length === 0) {
        scroll.innerHTML = `<div class="empty-items"><div class="empty-items-icon">📋</div><div>No items in this category</div><div style="color:var(--muted);font-size:12px;margin-top:4px">Add items in the Finance Planner</div></div>`;
        return;
      }

      cat.items.forEach(item => {
        scroll.appendChild(item.type === 'fixed'
          ? makeFixedRow(item, cat, budget)
          : makeVariableSection(item, cat, budget));
      });
    }

    /* ────── Fixed item ────── */
    function makeFixedRow(item, cat, budget) {
      const row = document.createElement('div');
      row.className = 'item-row bc-fixed-row';
      row.innerHTML = `
        <label class="bc-fixed-label">
          <input type="checkbox" class="bt-checkbox" ${item.paid ? 'checked' : ''}>
          <span class="item-name${item.paid ? ' paid' : ''}">${esc(item.name)}</span>
        </label>
        <span class="item-amt">${fmt(item.allocatedAmount)}</span>
        <span class="item-type-badge fixed">Fixed</span>
      `;
      const cb = row.querySelector('.bt-checkbox');
      cb.addEventListener('change', () => {
        item.paid = cb.checked;
        State.saveBudget(budget);
        renderPage();
      });
      return row;
    }

    /* ────── Variable item ────── */
    function makeVariableSection(item, cat, budget) {
      const wrap = document.createElement('div');
      wrap.className = 'bc-var-section';

      const spent = item.transactions.reduce((s, t) => s + t.amount, 0);
      const remaining = item.allocatedAmount - spent;
      const over = remaining < 0;
      const pct = item.allocatedAmount > 0 ? Math.min((spent / item.allocatedAmount) * 100, 100) : 0;

      const header = document.createElement('div');
      header.className = 'item-row bc-var-header';
      header.innerHTML = `
        <span class="item-name">${esc(item.name)}</span>
        <span class="item-type-badge variable">Variable</span>
        <div class="bc-var-amounts">
          <span class="${over ? 'over' : 'expense'}">${fmt(spent)}</span>
          <span class="bc-sep"> / ${fmt(item.allocatedAmount)}</span>
        </div>
        <span class="bc-var-remaining${over ? ' over' : ''}">${over ? '−' : ''}${fmt(Math.abs(remaining))}</span>
      `;

      const bar = document.createElement('div');
      bar.className = 'bt-bar-track bc-var-bar';
      bar.innerHTML = `<div class="bt-bar-fill${over ? ' over' : ''}" style="width:${pct}%"></div>`;

      const txnSection = document.createElement('div');
      txnSection.className = 'bc-txn-section';

      const addFormEl = document.createElement('div');
      addFormEl.className = 'bc-add-form';
      renderAddForm(item, budget, addFormEl);

      const listEl = document.createElement('div');
      listEl.className = 'bc-txn-list';
      renderTxnList(item, budget, listEl);

      txnSection.append(addFormEl, listEl);
      wrap.append(header, bar, txnSection);
      return wrap;
    }

    function renderAddForm(item, budget, container) {
      container.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'bc-add-row';
      row.innerHTML = `
        <input type="number" class="bc-amt-input" placeholder="Amount" min="0" step="0.01">
        <input type="text" class="bc-note-input" placeholder="Note (optional)">
        <input type="date" class="bc-date-input">
        <button class="btn btn-primary bc-save-btn">Add</button>
      `;

      const amtInput  = row.querySelector('.bc-amt-input');
      const noteInput = row.querySelector('.bc-note-input');
      const dateInput = row.querySelector('.bc-date-input');
      dateInput.value = new Date().toISOString().split('T')[0];

      const save = () => {
        const amount = parseFloat(amtInput.value);
        if (isNaN(amount) || amount <= 0) { amtInput.focus(); return; }
        item.transactions.push({
          id: State.genId(),
          amount,
          note: noteInput.value.trim(),
          date: dateInput.value || new Date().toISOString().split('T')[0]
        });
        State.saveBudget(budget);
        amtInput.value = '';
        noteInput.value = '';
        renderPage();
      };

      row.querySelector('.bc-save-btn').addEventListener('click', save);
      amtInput.addEventListener('keydown', e => { if (e.key === 'Enter') noteInput.focus(); });
      noteInput.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
      container.appendChild(row);
    }

    function renderTxnList(item, budget, container) {
      container.innerHTML = '';
      if (item.transactions.length === 0) {
        container.innerHTML = `<div class="txn-empty">No transactions yet</div>`;
        return;
      }
      const sorted = [...item.transactions].sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach(txn => {
        const row = document.createElement('div');
        row.className = 'txn-row';
        row.innerHTML = `
          <span class="txn-date">${formatDate(txn.date)}</span>
          <span class="txn-note">${esc(txn.note || '—')}</span>
          <span class="txn-amt">${fmt(txn.amount)}</span>
          <button class="txn-del">×</button>
        `;
        row.querySelector('.txn-del').addEventListener('click', () => {
          item.transactions = item.transactions.filter(t => t.id !== txn.id);
          State.saveBudget(budget);
          renderPage();
        });
        container.appendChild(row);
      });
    }

    /* ════════════════════════════════════════
       PANEL RESIZER
    ════════════════════════════════════════ */
    function initResizer() {
      if (window.matchMedia('(max-width: 700px)').matches) return;
      const leftPanel  = document.querySelector('.items-panel');
      const rightPanel = document.getElementById('chartSide');
      const handle     = document.getElementById('panelResizer');
      const STORAGE_KEY = 'catPanelWidth';
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) rightPanel.style.flex = `0 0 ${saved}px`;
      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handle.classList.add('resizing');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        const startX     = e.clientX;
        const startRight = rightPanel.getBoundingClientRect().width;
        const startLeft  = leftPanel.getBoundingClientRect().width;
        const minRight = 200, minLeft = 260;
        function onMove(e) {
          const delta    = e.clientX - startX;
          const newRight = Math.max(minRight, Math.min(startRight - delta, startLeft + startRight - minLeft));
          rightPanel.style.flex = `0 0 ${newRight}px`;
          localStorage.setItem(STORAGE_KEY, newRight);
          if (catChart) catChart.resize();
          if (overallChart) overallChart.resize();
        }
        function onUp() {
          handle.classList.remove('resizing');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    /* ════════════════════════════════════════
       INIT
    ════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', async () => {
      const ok = await State.requireAuth();
      if (!ok) return;
      const { month } = getParams();
      document.getElementById('navBack').addEventListener('click', () => {
        window.location.href = `budget-tracker.html?month=${month}`;
      });
      renderPage();
      initResizer();
    });
  </script>
</body>
</html>
