<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="flanner — plan your finances, track your budget, and grow your savings.">
  <meta name="theme-color" content="#000000">

  <!-- Open Graph -->
  <meta property="og:site_name" content="flanner">
  <meta property="og:type" content="website">
  <meta property="og:image" content="social-banner.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="social-banner.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta property="og:title" content="flanner — finance plans">
  <meta name="twitter:title" content="flanner — finance plans">
  <title>flanner — finance plans</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-hub">
  <nav class="top-nav">
    <button class="nav-back" aria-label="Back" onclick="window.location.href='landing-page.html'">←</button>
    <span class="nav-title">Finance Plans</span>
    <div class="nav-actions"></div>
  </nav>

  <div class="hub-wrap" id="hubWrap"></div>

  <!-- Rename modal -->
  <div class="modal-backdrop hidden" id="renameBackdrop"></div>
  <div class="modal hidden" id="renameModal">
    <div class="modal-header">
      <span class="modal-title">Rename Plan</span>
      <button class="modal-close" id="renameClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Plan name</label>
        <input type="text" id="renameInput" placeholder="My Plan">
      </div>
      <button class="btn btn-primary btn-full" id="renameSave">Save</button>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    /* ─── Render ─── */
    function render() {
      const data = State.getData();
      const wrap = document.getElementById('hubWrap');
      wrap.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'hub-grid';

      data.plans.forEach(plan => {
        grid.appendChild(makePlanCard(plan, data));
      });

      grid.appendChild(makeNewCard());
      wrap.appendChild(grid);
    }

    function makePlanCard(plan, data) {
      const card = document.createElement('div');
      card.className = 'hub-card plan-card';

      card.innerHTML = `
        <div class="hub-card-header">
          <span class="hub-card-title">${esc(plan.name)}</span>
        </div>
        <div class="hub-card-actions-row">
          <button class="hca-btn" data-action="rename" title="Rename"><img src="Icons/Rename.svg" class="svg-icon btn-svg-icon" alt=""></button>
          <button class="hca-btn" data-action="duplicate" title="Duplicate"><img src="Icons/Copy.svg" class="svg-icon btn-svg-icon" alt=""></button>
          ${data.plans.length > 1 ? `<button class="hca-btn danger" data-action="delete" title="Delete"><img src="Icons/Delete.svg" class="svg-icon btn-svg-icon" alt=""></button>` : ''}
        </div>
        <button class="btn btn-primary hub-open-btn">Open →</button>
      `;

      card.querySelector('[data-action="rename"]').addEventListener('click', (e) => {
        e.stopPropagation();
        openRenameModal(plan.id, plan.name);
      });

      card.querySelector('[data-action="duplicate"]').addEventListener('click', (e) => {
        e.stopPropagation();
        duplicatePlan(plan.id);
      });

      const delBtn = card.querySelector('[data-action="delete"]');
      if (delBtn) {
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!confirm(`Delete "${plan.name}"? This cannot be undone.`)) return;
          deletePlan(plan.id);
        });
      }

      card.querySelector('.hub-open-btn').addEventListener('click', () => openPlan(plan.id));

      return card;
    }

    function makeNewCard() {
      const card = document.createElement('div');
      card.className = 'hub-card hub-new-card';
      card.innerHTML = `
        <div class="hub-new-icon">+</div>
        <span class="hub-new-label">New Finance Plan</span>
      `;
      card.addEventListener('click', addPlan);
      return card;
    }

    /* ─── Plan actions ─── */
    async function openPlan(planId) {
      const data = State.getData();
      data.activePlanId = planId;
      State.saveData(data);
      await State.flush();
      window.location.href = 'finance-app.html';
    }

    async function addPlan() {
      const data = State.getData();
      const plan = State.newPlan('Plan ' + (data.plans.length + 1));
      data.plans.push(plan);
      data.activePlanId = plan.id;
      State.saveData(data);
      await State.flush();
      render();
    }

    async function duplicatePlan(planId) {
      const data = State.getData();
      const src = data.plans.find(p => p.id === planId);
      if (!src) return;
      const copy = JSON.parse(JSON.stringify(src));
      copy.id   = State.genId();
      copy.name = src.name + ' (copy)';
      [...copy.income.categories, ...copy.expenses.categories].forEach(cat => {
        const oldCatId = cat.id;
        cat.id = State.genId();
        cat.items.forEach(item => {
          const oldItemId = item.id;
          item.id = State.genId();
          if (item.pctMode) {
            if (item.refType === 'cat'  && item.refId === oldCatId)  item.refId = cat.id;
            if (item.refType === 'item' && item.refId === oldItemId) item.refId = item.id;
          }
        });
      });
      data.plans.splice(data.plans.findIndex(p => p.id === planId) + 1, 0, copy);
      State.saveData(data);
      await State.flush();
      render();
    }

    async function deletePlan(planId) {
      const data = State.getData();
      if (data.plans.length <= 1) return;
      data.plans = data.plans.filter(p => p.id !== planId);
      if (data.activePlanId === planId) data.activePlanId = data.plans[0].id;
      State.saveData(data);
      await State.flush();
      render();
    }

    /* ─── Rename modal ─── */
    let renamePlanId = null;

    function openRenameModal(planId, currentName) {
      renamePlanId = planId;
      document.getElementById('renameInput').value = currentName;
      document.getElementById('renameBackdrop').classList.remove('hidden');
      document.getElementById('renameModal').classList.remove('hidden');
      setTimeout(() => { document.getElementById('renameInput').focus(); document.getElementById('renameInput').select(); }, 50);
    }

    function closeRenameModal() {
      document.getElementById('renameBackdrop').classList.add('hidden');
      document.getElementById('renameModal').classList.add('hidden');
      renamePlanId = null;
    }

    async function commitRename() {
      const name = document.getElementById('renameInput').value.trim();
      if (!name || !renamePlanId) return;
      const data = State.getData();
      const plan = data.plans.find(p => p.id === renamePlanId);
      if (plan) plan.name = name;
      State.saveData(data);
      await State.flush();
      closeRenameModal();
      render();
    }

    document.getElementById('renameClose').addEventListener('click', closeRenameModal);
    document.getElementById('renameBackdrop').addEventListener('click', closeRenameModal);
    document.getElementById('renameSave').addEventListener('click', commitRename);
    document.getElementById('renameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') commitRename();
      if (e.key === 'Escape') closeRenameModal();
    });

    /* ─── Init ─── */
    document.addEventListener('DOMContentLoaded', async () => {
      const ok = await State.requireAuth();
      if (!ok) return;
      State.initSync(render);
      render();
    });
  </script>

</body>
</html>
